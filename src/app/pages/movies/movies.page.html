<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Films</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Films</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Formulaire film</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <form (ngSubmit)="addMovie()" class="movie-form">
        <ion-item>
          <ion-label position="stacked">Titre</ion-label>
          <ion-input name="titre" required [(ngModel)]="movieForm.titre"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Genre</ion-label>
          <ion-input name="genre" required [(ngModel)]="movieForm.genre"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Année de sortie</ion-label>
          <ion-input name="anneeSortie" type="number" min="1888" required [(ngModel)]="movieForm.anneeSortie"></ion-input>
        </ion-item>
        <ion-button type="submit" expand="block">
          <ion-icon name="add-circle-outline" slot="start"></ion-icon>
          Ajouter
        </ion-button>
      </form>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Liste des films</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      @if (movies.length === 0) {
        <ion-note>Aucun film ajouté.</ion-note>
      } @else {
        <ion-list>
          @for (movie of movies; track movie.id) {
            <ion-item>
              <ion-label>
                <h2>{{ movie.titre }}</h2>
                <p>{{ movie.genre }} - {{ movie.anneeSortie }}</p>
              </ion-label>
              <ion-buttons slot="end">
                <ion-button color="danger" fill="clear" (click)="deleteMovie(movie.id)">
                  <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
                </ion-button>
              </ion-buttons>
            </ion-item>
          }
        </ion-list>
      }
    </ion-card-content>
  </ion-card>
</ion-content>
