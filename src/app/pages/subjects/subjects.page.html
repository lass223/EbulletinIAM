<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Matières</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Matières</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Formulaire matière</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <form (ngSubmit)="addSubject()" class="subject-form">
        <ion-item>
          <ion-label position="stacked">Code</ion-label>
          <ion-input name="code" required [(ngModel)]="subjectForm.code"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Libellé</ion-label>
          <ion-input name="libelle" required [(ngModel)]="subjectForm.libelle"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Coefficient</ion-label>
          <ion-input name="coefficient" type="number" min="1" required [(ngModel)]="subjectForm.coefficient"></ion-input>
        </ion-item>
        <ion-button type="submit" expand="block">
          <ion-icon name="add-circle-outline" slot="start"></ion-icon>
          Ajouter
        </ion-button>
      </form>
    </ion-card-content>
  </ion-card>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Liste des matières</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      @if (subjects.length === 0) {
        <ion-note>Aucune matière ajoutée.</ion-note>
      } @else {
        <ion-list>
          @for (subject of subjects; track subject.id) {
            <ion-item>
              <ion-label>
                <h2>{{ subject.libelle }}</h2>
                <p>{{ subject.code }} - Coefficient {{ subject.coefficient }}</p>
              </ion-label>
              <ion-buttons slot="end">
                <ion-button color="danger" fill="clear" (click)="deleteSubject(subject.id)">
                  <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
                </ion-button>
              </ion-buttons>
            </ion-item>
          }
        </ion-list>
      }
    </ion-card-content>
  </ion-card>
</ion-content>
